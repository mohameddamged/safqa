<div class="profile-page">

  <!-- Title row -->
  <div class="title-row">
    <h1 class="page-title">Personal Info</h1>
    <button class="title-edit-btn" title="Edit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              stroke="#AAAABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              stroke="#AAAABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Avatar -->
  <div class="avatar-section">
    <div class="avatar-wrapper">
      <div class="avatar-circle"></div>
      <button class="avatar-edit-btn" title="Change photo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                stroke="#AAAABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                stroke="#AAAABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Personal Info card -->
  <div class="info-card">
    <div class="field-group">
      <label class="field-label">First Name</label>
      <input type="text" class="field-input" [(ngModel)]="firstName" />
    </div>
    <div class="field-group">
      <label class="field-label">Last Name</label>
      <input type="text" class="field-input" [(ngModel)]="lastName" />
    </div>
    <div class="field-group">
      <label class="field-label">Phone  Number</label>
      <input type="text" class="field-input" [(ngModel)]="phoneNumber" />
    </div>
  </div>

  <!-- Position Info -->
  <h2 class="section-title">Position Info</h2>

  <div class="info-card">
    <div class="field-group">
      <label class="field-label">Work e-mail</label>
      <input type="text" class="field-input field-teal" [value]="workEmail" readonly />
    </div>
    <div class="field-group">
      <label class="field-label">Title</label>
      <input type="text" class="field-input field-teal" [value]="title" readonly />
    </div>
  </div>

</div>
