<div class="members-page">

  <h1 class="page-title">My Team</h1>

  <div class="team-table-wrapper">
    <table class="team-table">
      <thead>
        <tr>
          <th class="th-id">ID</th>
          <th>Name</th>
          <th>Position</th>
          <th>Email</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let member of members(); let i = index">
          <td class="td-id">{{ member.id }}</td>
          <td class="td-name">{{ member.name }}</td>
          <td class="td-position">{{ member.position }}</td>
          <td class="td-email">{{ member.email }}</td>
          <td class="td-status">
            <span class="status-badge"
              [ngClass]="{
                'badge-active':    member.status === 'Active',
                'badge-invited':   member.status === 'Invited',
                'badge-suspended': member.status === 'Suspended'
              }">
              {{ member.status }}
            </span>
          </td>
          <td class="td-actions">
            <div class="action-wrapper">
              <button class="dots-btn" (click)="toggleMenu(i, $event)">
                <span></span><span></span><span></span>
              </button>
              <div class="context-menu" *ngIf="openMenuIndex === i">
                <button class="ctx-item" (click)="doAction('edit-role', i)">Edit Role</button>
                <ng-container *ngIf="member.status === 'Active'">
                  <button class="ctx-item" (click)="doAction('suspend', i)">Suspend User</button>
                </ng-container>
                <ng-container *ngIf="member.status === 'Invited'">
                  <button class="ctx-item" (click)="doAction('resend', i)">Resend Invitation</button>
                  <button class="ctx-item" (click)="doAction('suspend', i)">Suspend User</button>
                </ng-container>
                <ng-container *ngIf="member.status === 'Suspended'">
                  <button class="ctx-item" (click)="doAction('activate', i)">Activate User</button>
                </ng-container>
                <button class="ctx-item ctx-danger" (click)="doAction('remove', i)">Remove User</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="page-actions">
    <button class="btn-invite" (click)="openInviteModal()">Invite Team Member &nbsp;+</button>
    <button class="btn-learn">Learn About Roles And Permissions</button>
  </div>

</div>

<!-- INVITE MODAL -->
<div class="modal-overlay" *ngIf="showModal" (click)="onOverlayClick($event)">
  <div class="modal-box" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 class="modal-title">Invite Team Member</h3>
      <button class="modal-close" (click)="closeModal()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="2" y1="2" x2="16" y2="16" stroke="#9999AA" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="16" y1="2" x2="2" y2="16" stroke="#9999AA" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Member Email <span class="required">*</span></label>
        <input type="email" class="field-input" [(ngModel)]="form.email" />
      </div>
      <div class="field-group">
        <label class="field-label">Select Role <span class="required">*</span></label>
        <div class="custom-select-trigger" [class.cs-open]="roleDropOpen" (click)="toggleRoleDrop()">
          <span class="cs-value" [class.cs-placeholder]="!form.role">
            {{ form.role ? getRoleLabel(form.role) : '' }}
          </span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 3 L21 12 L12 21 L3 12 Z" stroke="#3ECFCF" stroke-width="2" fill="none"/>
          </svg>
        </div>
        <div class="role-panel" *ngIf="roleDropOpen">
          <div class="role-panel-header">
            <span class="role-panel-selected">Selected Unit</span>
            <svg class="role-panel-close" width="14" height="14" viewBox="0 0 24 24" fill="none" (click)="closeRoleDrop()">
              <path d="M12 3 L21 12 L12 21 L3 12 Z" stroke="#3ECFCF" stroke-width="2" fill="none"/>
            </svg>
          </div>
          <div class="role-options">
            <label class="role-option" *ngFor="let r of roles">
              <input type="radio" name="role" [value]="r.value" [(ngModel)]="form.role" (change)="onRoleSelect(r.value)" />
              <span class="role-radio-circle"></span>
              <span class="role-option-label">{{ r.label }}</span>
            </label>
          </div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Message</label>
        <textarea class="field-input field-textarea" [(ngModel)]="form.message" rows="4"
          placeholder="Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua."></textarea>
      </div>
    </div>
    <div class="modal-footer">
     <button class="btn-send" (click)="sendInvite()" [disabled]="!form.email || !form.role || isSendingInvite">
  {{ isSendingInvite ? 'Sending...' : 'Send Invite' }}
  @if (!isSendingInvite) {
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="margin-left:8px;">
      <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  }
</button>
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
    </div>
  </div>
</div>
