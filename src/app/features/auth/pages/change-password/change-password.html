<app-auth-shell
  title="Change Password"
  [subtitle]="'Enter new Password for your account ' + currentEmail()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="change-form">
    <app-password-input
      formControlName="currentPassword"
      label="Old password"
      [required]="true"
      autocomplete="current-password"
      [errorMessage]="fieldError('currentPassword', 'Old password')"
    ></app-password-input>

    <app-password-input
      formControlName="newPassword"
      label="Create password"
      [required]="true"
      autocomplete="new-password"
      [errorMessage]="fieldError('newPassword', 'Password')"
    ></app-password-input>

    <app-password-input
      formControlName="confirmPassword"
      label="Confirm password"
      [required]="true"
      autocomplete="new-password"
      [errorMessage]="confirmPasswordError"
    ></app-password-input>

    <app-password-rules [rules]="passwordRuleState()"></app-password-rules>

    <app-primary-button [loading]="loading()">Change Password</app-primary-button>
  </form>
</app-auth-shell>
