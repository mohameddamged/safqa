<app-auth-shell title="Sign up" subtitle="welcome to Safqa! Please select your role to continue sign up">
  <div class="roles">
    @for (option of options; track option.role) {
      <div class="role-card" [class]="option.accentClass">
        <div class="role-card__art" aria-hidden="true"></div>
        <h3 class="role-card__title">{{ option.title }}</h3>
        <ul class="role-card__bullets">
          @for (bullet of option.bullets; track bullet) {
            <li>{{ bullet }}</li>
          }
        </ul>
        <button type="button" class="role-card__select" (click)="select(option.role)">
          Select
        </button>
      </div>
    }
  </div>

  <p class="roles__footer">Already have an account? <a routerLink="/auth/login">Login</a></p>
</app-auth-shell>
