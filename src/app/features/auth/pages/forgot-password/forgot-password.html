<app-auth-shell
  title="Forgot Password"
  subtitle="Don't worry, ENTER your email & we w'll send you a verification code to reset your password"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="forgot-form">
    <app-text-input
      formControlName="email"
      label="Enter your e-mail"
      type="email"
      [required]="true"
      autocomplete="email"
      [errorMessage]="fieldError('email', 'Email')"
    ></app-text-input>

    <app-primary-button [loading]="loading()" [icon]="mailIcon">Send Code</app-primary-button>
  </form>

  <app-step-indicator [currentStep]="1" [totalSteps]="3"></app-step-indicator>
</app-auth-shell>
