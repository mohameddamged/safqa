<app-auth-shell
  title="Create new Password"
  subtitle="Your new password must be different from previous old password"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="reset-form">
    <app-password-input
      formControlName="newPassword"
      label="Create password"
      [required]="true"
      autocomplete="new-password"
      [errorMessage]="fieldError('newPassword', 'Password')"
    ></app-password-input>

    <app-password-input
      formControlName="confirmPassword"
      label="Confirm password"
      [required]="true"
      autocomplete="new-password"
      [errorMessage]="confirmPasswordError"
    ></app-password-input>

    <app-password-rules [rules]="passwordRuleState()"></app-password-rules>

    <app-primary-button [loading]="loading()">Change Password</app-primary-button>
  </form>

  <app-step-indicator [currentStep]="3" [totalSteps]="3"></app-step-indicator>
</app-auth-shell>
