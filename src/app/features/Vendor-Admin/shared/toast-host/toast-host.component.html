<div class="toast-stack" aria-live="polite" aria-atomic="true">
  <div
    class="toast-card"
    *ngFor="let toast of toastService.toasts()"
    [ngClass]="'toast-' + toast.type"
  >
    <div class="toast-icon">
      <svg *ngIf="toast.type === 'success'" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/>
        <path d="M7.5 12.5l3 3 6-6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg *ngIf="toast.type === 'error'" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/>
        <path d="M12 7.5v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="16.5" r="1.15" fill="currentColor"/>
      </svg>
      <svg *ngIf="toast.type === 'info'" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/>
        <path d="M12 11v5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="7.7" r="1.15" fill="currentColor"/>
      </svg>
    </div>

    <div class="toast-body">
      <p class="toast-title">{{ toast.title }}</p>
      <p class="toast-line" *ngFor="let line of lines(toast.message)">{{ line }}</p>
    </div>

    <button type="button" class="toast-close" (click)="close(toast.id)" aria-label="Dismiss">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="toast-progress"></div>
  </div>
</div>
