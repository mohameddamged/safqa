<div class="p-8 bg-gray-50 min-h-screen">
    <nav class="text-sm text-[#25B6AB]  mb-6">
        <a routerLink="/system-admin/verifications/{{type}}" class="hover:text-orange-500 capitalize">{{type}}</a>
        <span class="text-[#25B6AB]  mx-2">></span>
        <span class="text-[#25B6AB] ">Details</span>
    </nav>

    @if (data()) {
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-orange-100 grid grid-cols-3 gap-8">

        <div class="col-span-2 grid grid-cols-2 gap-x-6 gap-y-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Company Name</label>
                <input type="text" [value]="data().companyName" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Tax ID</label>
                <input type="text" [value]="data().taxId" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl rounded-tr-[3rem] border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Work E-mail</label>
                <input type="text" [value]="data().workEmail" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Phone Number</label>
                <input type="text" [value]="data().phoneNumber" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Country</label>
                <input type="text" [value]="data().country || 'N/A'" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">State / Region</label>
                <input type="text" [value]="data().stateRegion || 'N/A'" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">city</label>
                <input type="text" [value]="data().address?.city || 'N/A'" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">streetNumber</label>
                <input type="text" [value]="data().address?.streetNumber || 'N/A'" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
            <div class="col-span-2">
                <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Full Address</label>
                <input type="text" [value]="data().fullAddress || 'N/A'" readonly
                    class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 text-gray-700 outline-none">
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <div
                class="flex-1 bg-gray-100 rounded-2xl flex items-center justify-center border-2 border-dashed border-gray-200 overflow-hidden">
                <img [src]="data().taxIdFrontImageUrl" alt="Front" class="h-full w-full object-cover">
            </div>
            <div
                class="flex-1 bg-gray-100 rounded-2xl flex items-center justify-center border-2 border-dashed border-gray-200 overflow-hidden">
                <img [src]="data().taxIdBackImageUrl" alt="Back" class="h-full w-full object-cover">
            </div>
        </div>
    </div>

    <div class="flex gap-6 mt-8">
        <button (click)="onApprove()"
            class="flex-1 bg-[#E8F8F5] text-[#27AE60] py-4 rounded-2xl font-bold hover:bg-[#D5F5E3] transition">Accept</button>
        <button (click)="showRejectModal.set(true)"
            class="flex-1 bg-[#FFF1F1] text-[#E74C3C] py-4 rounded-2xl font-bold hover:bg-[#FDE2E2] transition">Reject</button>
    </div>
    }

    @if (showRejectModal()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl shadow-xl w-96">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Reject Request</h3>
            <p class="text-sm text-gray-500 mb-4">Please provide a reason for rejecting this {{type}}.</p>
            <textarea [value]="rejectionReason()" (input)="rejectionReason.set($any($event.target).value)"
                class="w-full p-3 border border-gray-200 rounded-xl mb-6 outline-none focus:border-orange-500" rows="3"
                placeholder="Enter reason here...">
            </textarea>
            <div class="flex gap-3">
                <button (click)="showRejectModal.set(false)"
                    class="flex-1 py-2 text-gray-500 font-medium">Cancel</button>
                <button (click)="confirmReject()"
                    class="flex-1 bg-red-500 text-white py-2 rounded-xl font-bold hover:bg-red-600">Confirm</button>
            </div>
        </div>
    </div>
    }
</div>
