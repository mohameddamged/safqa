<div class="p-8 bg-gray-50 min-h-screen">
  <nav class="text-sm mb-6">
    <a routerLink="/system-admin/escrow-payments/companies" class="text-[#25B6AB] hover:opacity-80">All Companies</a>
    <span class="text-[#25B6AB] mx-2">></span>
    <a routerLink="." class="text-[#25B6AB] underline">Payment Details</a>
  </nav>

  @if (isLoading()) {
  <div class="p-20 text-center text-gray-400">Loading...</div>
  } @else {
  <div class="flex justify-between items-start mb-8">
    <h1 class="text-3xl font-bold text-[#2E1911]">
      Payment of PO title: {{ listItem()?.companyName || data()?.vendorLegalName || ('#' + poId) }}
    </h1>
    <span class="px-5 py-1.5 rounded-full text-sm font-semibold" [ngStyle]="statusStyle">
      {{ status || '—' }}
    </span>
  </div>

  <div class="flex gap-8 items-start">
    <div class="flex-1 flex flex-col gap-5 max-w-xl">
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-1 block">Company Name</label>
        <input type="text" [value]="listItem()?.companyName || 'Lorem Ipsum'" readonly
          class="w-full p-3.5 bg-white rounded-full border border-[#25B6AB]/40 text-gray-700 outline-none">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-1 block">Amount Transferred</label>
        <input type="text"
          [value]="(listItem()?.cost !== undefined && listItem()?.cost !== 0) ? listItem()?.cost : 'Lorem Ipsum'"
          readonly class="w-full p-3.5 bg-white rounded-full border border-[#25B6AB]/40 text-gray-700 outline-none">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-1 block">Currency</label>
        <input type="text" [value]="listItem()?.currency || 'Lorem Ipsum'" readonly
          class="w-full p-3.5 bg-white rounded-full border border-[#25B6AB]/40 text-gray-700 outline-none">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-1 block">Payment Date</label>
        <input type="text"
          [value]="listItem()?.paymentDate ? (listItem()?.paymentDate | date:'dd/MM/yyyy') : 'Lorem Ipsum'" readonly
          class="w-full p-3.5 bg-white rounded-full border border-[#25B6AB]/40 text-gray-700 outline-none">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-1 block">Vendor Name</label>
        <input type="text" [value]="data()?.vendorLegalName || 'Lorem Ipsum'" readonly
          class="w-full p-3.5 bg-white rounded-full border border-[#25B6AB]/40 text-gray-700 outline-none">
      </div>

      @if (isPending) {
      <div class="flex gap-6 mt-2">
        <button
          class="flex-1 text-white py-3.5 rounded-full font-bold transition-all hover:opacity-90"
          style="background: linear-gradient(to right, #E47C55, #EFA063);">
          Approve Payment
        </button>
        <button
          class="flex-1 py-3.5 rounded-full font-bold border-2 border-[#EFA063] text-[#E47C55] hover:bg-orange-50 transition-all">
          Reject Payment
        </button>
      </div>
      }
    </div>

    <div class="w-96 aspect-[4/5] bg-white rounded-2xl shadow-sm border border-gray-100"></div>
  </div>
  }
</div>
