<div class="field">
  <div class="control" [class.has-error]="errorMessage && touched">
    <input
      [type]="visible ? 'text' : 'password'"
      [value]="value"
      [disabled]="disabled"
      [autocomplete]="autocomplete"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
      placeholder=" "
      class="control__input"
    />
    <label class="control__label">{{ label }}{{ required ? ' *' : '' }}</label>

    <button
      type="button"
      class="control__toggle"
      (click)="toggleVisibility()"
      [attr.aria-label]="visible ? 'Hide password' : 'Show password'"
      tabindex="-1"
    >
      <app-icon [name]="visible ? 'eye' : 'eye-off'" [size]="18"></app-icon>
    </button>
  </div>

  @if (errorMessage && touched) {
    <p class="field__error">{{ errorMessage }}</p>
  }
</div>
