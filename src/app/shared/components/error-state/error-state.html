<div class="error-container">
  <div class="plug-wrap">
    <!-- Cord -->
    <svg class="cord" viewBox="0 0 60 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 0 Q10 20 30 40 Q50 60 30 80" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
    <!-- Plug -->
    <div class="plug">
      <div class="plug-body">
        <div class="plug-pin"></div>
        <div class="plug-pin"></div>
      </div>
      <div class="plug-sparks">
        <span class="spark s1">✦</span>
        <span class="spark s2">✦</span>
        <span class="spark s3">✦</span>
      </div>
    </div>
    <!-- Socket -->
    <div class="socket">
      <div class="socket-hole"></div>
      <div class="socket-hole"></div>
    </div>
  </div>

  <h3 class="error-title">Oops! Connection Lost</h3>
  <p class="error-msg">{{ message }}</p>
</div>
