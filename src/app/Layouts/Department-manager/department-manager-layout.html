<div class="dm-layout">
  <!-- Navbar — same as Procurement Officer -->
  <app-procurement-officer-navbar class="dm-navbar"></app-procurement-officer-navbar>

  <div class="dm-body">
    <!-- Sidebar -->
    <aside class="dm-sidebar">
      <nav class="dm-sidebar__nav">
        <a routerLink="/department-manager/dashboard"
           routerLinkActive="dm-sidebar__link--active"
           [routerLinkActiveOptions]="{exact: true}"
           class="dm-sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Dashboard</span>
        </a>

        <a routerLink="/department-manager/upload-pr"
           routerLinkActive="dm-sidebar__link--active"
           class="dm-sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <span>Upload PR</span>
        </a>

        <a routerLink="/department-manager/my-prs"
           routerLinkActive="dm-sidebar__link--active"
           class="dm-sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>My PRs</span>
        </a>

        <a routerLink="/department-manager/delivered-pos"
           routerLinkActive="dm-sidebar__link--active"
           class="dm-sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
            <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
          </svg>
          <span>Delivered POs</span>
        </a>
      </nav>

      <!-- Bottom section -->
      <nav class="dm-sidebar__nav dm-sidebar__nav--bottom">
        <a routerLink="/department-manager/profile"
           routerLinkActive="dm-sidebar__link--active"
           class="dm-sidebar__link">
          <span class="dm-sidebar__avatar"></span>
          <span>Profile</span>
        </a>
        <a routerLink="/account/change-password" class="dm-sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>Change Password</span>
        </a>
        <button type="button" class="dm-sidebar__link dm-sidebar__link--danger" (click)="logout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Logout</span>
        </button>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="dm-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
